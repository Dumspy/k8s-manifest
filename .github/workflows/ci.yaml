name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  RENDERED_DIR: rendered
  K8S_VERSION: 1.31.0

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-24.11

      - name: Lint YAML
        run: nix develop --command yamllint .

      - name: Render Charts
        run: |
          nix develop --command bash -c '
            set -e
            mkdir -p ${{ env.RENDERED_DIR }}
            for chart in charts/*/; do
              [ -d "$chart" ] || continue
              name=$(basename "$chart")
              echo "Rendering: $name"
              helm dependency update "$chart" > /dev/null
              helm template "$name" "$chart" --include-crds > "${{ env.RENDERED_DIR }}/chart-$name.yaml"
            done
          '

      - name: Collect Manifests
        run: |
          # Copy ArgoCD and unmanaged manifests to the rendered directory for scanning
          [ -d "argo-apps" ] && cp -r argo-apps/ "${{ env.RENDERED_DIR }}/"
          [ -d "unmanaged" ] && cp -r unmanaged/ "${{ env.RENDERED_DIR }}/"

      - name: Kubeconform Validation
        run: |
          # Validating against standard K8s schemas only.
          # -ignore-missing-schemas is used to skip deep validation of CRDs (e.g. ArgoCD, 1Password)
          # without failing the build, as we've removed the external schema dependency.
          nix develop --command kubeconform \
            -kubernetes-version ${{ env.K8S_VERSION }} \
            -summary \
            -ignore-missing-schemas \
            ${{ env.RENDERED_DIR }}

      - name: Security Scan (Checkov)
        run: |
          nix develop --command checkov \
            --directory ${{ env.RENDERED_DIR }} \
            --framework kubernetes \
            --quiet

      - name: Best Practices Scan (Kube-score)
        run: |
          # Run kube-score on all collected manifests.
          nix develop --command bash -c '
            set -o pipefail
            find ${{ env.RENDERED_DIR }} -type f \( -name "*.yaml" -o -name "*.yml" \) \
            | xargs kube-score score
          '

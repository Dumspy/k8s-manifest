name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-24.11

      - name: YAML Lint
        run: nix develop --command yamllint .

      - name: Helm Lint
        run: |
          nix develop --command bash -c '
            for chart in charts/*/; do
              helm dependency update "$chart"
              helm lint "$chart"
            done
          '

  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-24.11

      - name: Run Validation Pipeline
        run: nix develop --command ./scripts/validate.sh

apiVersion: v1
kind: Service
metadata:
  name: {{ include "postgresql.fullname" . }}-headless
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: {{ include "postgresql.fullname" . }}
    component: postgres
  ports:
    - name: postgres
      port: {{ .Values.service.directPort }}
      targetPort: postgres

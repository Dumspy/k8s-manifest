apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-headless
  namespace: {{ .Release.Namespace }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: {{ .Release.Name }}
    component: postgres
  ports:
    - name: postgres
      port: {{ .Values.service.directPort }}
      targetPort: postgres
